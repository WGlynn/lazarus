# ============================================================================
# Lazarus + Sonar v2 (async transport) -- offline demo configuration
# ============================================================================
#
# This is the config the async cycle demo (run_async_demo.py) loads with the
# ordinary `config.load_config`. It is the v1 demo's config PLUS an [async] table,
# and NOTHING else changes: the [corpus], [sonar], [judge], and [ledger] sections
# point at the SAME shared demo paths the v1 demo uses, so the audit oracle is
# byte-identical to v1's -- 2 findings surfaced, 1 declined by the judge.
#
# Relative paths resolve against THIS file's directory (examples/async_demo/).
# The corpus and ledger deliberately reach UP-AND-OVER into the shared v1 demo
# dir (../demo/...) so there is exactly one corpus and one oracle across both
# demos. The pending queue and async spool are demo-local (./.lazarus/...): they
# are the v2 transport's own state, wiped and rebuilt on every run for
# reproducibility.
#
# No API key, no network, no `anthropic` package is needed to run the demo:
# [async].stub_judge = true forces the deterministic offline stub judge in the
# background runner, the same green oracle the v1 demo injects.
# ============================================================================

[corpus]
# The SAME three-rule corpus the v1 demo ships (no new corpus for v2).
# no-secrets-in-logs, timeout-on-external-calls, prefer-f-strings.
path = "../demo/corpus"
globs = ["**/*.md"]
exclude = []

[sonar]
# Identical high-recall firehose settings to the v1 demo, so SONAR proposes the
# same candidate shortlist against the same fixture diff.
top_n = 20
min_score = 0.05
title_boost = 2.0
path_boost = 1.5

[judge]
# The production judge model (documentation only). The demo never calls it: the
# background runner injects the deterministic offline stub judge instead (via
# [async].stub_judge = true), so the run needs no API key. min_confidence gates
# the stub's 0.9 (surface) vs 0.2 (decline) verdicts exactly as in v1.
model = "claude-opus-4-8"
min_confidence = 0.6

[ledger]
# Point at the SHARED v1 demo ledger so async and sync suppression line up and
# the oracle is identical. run_async_demo.py wipes it (and the pending queue and
# spool) before running, exactly as the v1 demo wipes its ledger, so the demo is
# reproducible: a stale DECLINED entry would otherwise suppress a candidate.
path = "../demo/.lazarus/ledger.jsonl"

[async]
# Master switch: run the launcher + runner + inject pipeline. A bare `mode` key
# overrides the LAZARUS_ASYNC auto-detect, so this demo is "async" regardless of
# the environment.
mode = "async"
# Where the background runner writes SURFACED findings for next-turn injection.
# Demo-local: this is the v2 transport's own state.
pending_path = ".lazarus/pending.jsonl"
# Spool dir for the launcher's extracted work-unit files (wu-<run_id>.txt) and
# the detached runner's per-run stdout/stderr log (log-<run_id>.txt).
spool_dir = ".lazarus/async"
# Force the deterministic offline stub judge in the background runner: no API
# key, no network, no `anthropic` package. This is what makes the async cycle
# reproducible and credential-free, the v2 analogue of the v1 demo's stub.
stub_judge = true

[async.pregate]
# The optional synchronous shift-left PreToolUse gate stays OFF for this demo:
# the demo proves the ASYNC cycle (launcher -> runner -> pending -> inject ->
# consume), not the on-path pre-gate.
enabled = false
