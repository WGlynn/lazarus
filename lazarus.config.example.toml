# ============================================================================
# Lazarus + Sonar: example configuration
# ============================================================================
#
# Copy this file to `lazarus.config.toml` (in your project root, or wherever
# you point --config at) and edit the values for your own corpus. Nothing in
# here is hardcoded to a particular project; the defaults below are neutral
# placeholders that you MUST replace with a real corpus path before the tool
# will run.
#
# What this file configures:
#   [corpus]  where your rules/memory/primitives live, and which files count
#   [sonar]   how the wide, cheap keyword search ranks candidate rules
#   [judge]   the precision filter: which judge model runs, and its thresholds
#   [ledger]  where the append-only SURFACED / ACTIONED / DECLINED log is kept
#   [async]   (v2) run the audit OFF the critical path, behind the next turn
#
# Fail-loud contract: if [corpus].path or [corpus].globs is missing, the tool
# raises a clear error and exits non-zero. There is NO silent fallback to
# scanning your home directory or the current working directory. This is
# deliberate: a knowledge audit that quietly points at the wrong corpus is
# worse than one that refuses to start.
#
# TOML is parsed with the stdlib `tomllib` on Python 3.11+. On 3.9-3.10 the
# tool uses the `tomli` backport, which `pip install lazarus-sonar` installs
# automatically as a base dependency (it is version-gated to `python_version <
# "3.11"`, so 3.11+ users pay nothing). A plain install works out of the box on
# every supported interpreter; there is no separate extra to remember.
#
# Every key below shows its default value (the value the tool uses if you omit
# the key). Keys marked REQUIRED have no usable default and must be set. Keys
# marked ACCEPTED (v1) are documented forward-compat knobs: they are parsed
# without error but not yet acted on in this release, so setting them is
# harmless and has no effect until a later version implements them.
# ============================================================================


# ----------------------------------------------------------------------------
# [corpus]: what Sonar searches
# ----------------------------------------------------------------------------
# Sonar is general: it can sweep any directory of text files, not just an
# agent's rule set. Point it at your rules/primitives/memory dir, a docs tree,
# a folder of past design threads: anything you want a finished work-unit
# audited against.
[corpus]

# REQUIRED. Absolute or relative path to the root of your corpus. Relative
# paths are resolved against the directory containing this config file, so a
# config committed alongside your rules keeps working when run from elsewhere.
# There is no default; omitting this is a fail-loud error.
#
# Examples:
#   path = "./rules"
#   path = "/home/you/.claude/memory"
#   path = "docs/primitives"
path = "./corpus"

# REQUIRED. Glob patterns (relative to `path`) selecting the files that count
# as corpus entries. Use "**" to recurse. At least one pattern is required;
# an empty list is a fail-loud error. Matching is case-sensitive on the parts
# of the pattern that your filesystem is case-sensitive about.
#
# Common choices:
#   globs = ["**/*.md"]                 # a tree of markdown rules
#   globs = ["**/*.md", "**/*.mdx"]     # markdown plus mdx
#   globs = ["*.md", "primitives/*.md"] # top level + one subdir, no deep recursion
globs = ["**/*.md"]

# Optional. Glob patterns (relative to `path`) to EXCLUDE after `globs` has
# matched. Applied as a second pass, so you can include broadly and carve out
# noise. Default is an empty list (exclude nothing).
#
# Typical excludes: generated files, archives, the corpus's own README, and
# anything that is prose-about-the-rules rather than a rule itself.
exclude = [
    "**/README.md",
    "**/_archive/**",
    "**/node_modules/**",
    "**/.git/**",
]

# Optional, ACCEPTED (v1): documented and parsed but not yet enforced this
# release. Intended maximum size, in kilobytes, of a single corpus file Sonar
# will read and tokenize. Once implemented, files larger than this will be
# skipped with a warning rather than silently dropped, since an oversized file
# is usually a generated dump or a concatenated log, not a rule. Planned
# default 512 (512 KB), with 0 meaning "no limit". Setting it today is harmless
# and has no effect.
max_file_kb = 512


# ----------------------------------------------------------------------------
# [sonar]: the perception / recall stage (wide, cheap, no LLM)
# ----------------------------------------------------------------------------
# Sonar tokenizes the work-unit and each corpus file, then scores overlap.
# This stage is deliberately HIGH RECALL and noisy: its raw output is a
# firehose that is never shown to a human; it exists only to hand Lazarus a
# shortlist. Tune these to widen or tighten that shortlist; do not tune them
# expecting precision (precision is Lazarus's job, below).
#
# v1 scoring is local keyword overlap (a TF-lite token intersection) plus two
# structural boosts. There are no embeddings in v1; the scorer is a single
# swappable function, so an embedding backend can replace it later without
# touching this config's shape.
[sonar]

# Number of top-ranked candidates Sonar returns to Lazarus, after dropping
# anything below `min_score`. This bounds how many rules the judge is asked
# about in one batch, which bounds cost and latency. Raising it improves
# recall (fewer buried rules missed) at higher judge cost. Default 20.
top_n = 20

# Minimum overlap score a corpus file must reach to be a candidate at all.
# Scores are normalized to roughly 0.0-1.0. Below this floor, a file is
# treated as irrelevant and never reaches the judge. Lower = wider net =
# more recall and more judge cost. Default 0.05 (very permissive; this is
# the firehose stage, so err wide and let Lazarus cut).
min_score = 0.05

# Structural boost applied when a work-unit token appears in a corpus file's
# title or filename (e.g. a rule named "no-secrets-in-logs.md" gets a boost
# when the diff mentions "secret" or "log"). Filename/title matches are a
# strong relevance signal, so this is weighted above raw body overlap.
# Set to 0.0 to disable. Default 2.0.
title_boost = 2.0

# Structural boost applied when a work-unit token appears in the corpus file's
# PATH (directory names), e.g. a diff touching "auth/" lifting rules under a
# "security/" or "auth/" corpus subtree. Weaker signal than the title, so
# weighted lower. Set to 0.0 to disable. Default 1.5.
path_boost = 1.5

# Extra stopwords to drop during tokenization, on top of the built-in English
# stopword list. Add domain filler that is common in your corpus and your work
# so it does not inflate overlap scores (e.g. your project's name, "rule",
# "primitive", "TODO"). Lowercased before comparison. Default is an empty list.
extra_stopwords = []


# ----------------------------------------------------------------------------
# [judge]: the cognition / precision stage (the LLM judge)
# ----------------------------------------------------------------------------
# Lazarus takes Sonar's shortlist, drops anything already DECLINED for this
# work-unit (the anti-nag suppression), then asks the judge model ONE
# question, batched across the surviving candidates:
#
#     "Would applying this buried rule have CHANGED the finished work?"
#
# The judge is instructed to default to NO and to reject rules that are merely
# on-topic-but-inert. That instruction IS the precision filter. Only candidates
# the judge marks would_change=true, above `min_confidence`, are emitted as
# retroactive-fix proposals. Lazarus PROPOSES; it never edits your files.
#
# The judge is the single biggest quality knob in the whole tool: precision
# tracks the model you put in `model`. Running the judge requires the optional
# `anthropic` extra (`pip install "lazarus-sonar[judge]"`) and an API key. Sonar
# and the ledger work with zero third-party deps and no key.
[judge]

# The judge model. This is the main quality lever, since a stronger model gives
# a stricter, better-calibrated "would this have changed the output?" verdict.
# Use an exact Anthropic model ID. Default "claude-opus-4-8" (the strongest
# Opus-tier model; precision-sensitive work gets the strong model by default).
# Swap to a cheaper model only if you have measured that it holds precision on
# your corpus.
model = "claude-opus-4-8"

# Minimum confidence (0.0-1.0) the judge must report on a would_change=true
# verdict for Lazarus to surface it. Raise toward 1.0 to show only high-
# certainty retroactive fixes (fewer, safer proposals); lower to see more
# borderline ones. Default 0.6.
min_confidence = 0.6

# Max tokens for the judge's structured response. The judge returns one
# compact JSON object per candidate (rule_id, would_change, where, patch,
# confidence, reason) via structured output, so this scales with `top_n`, not
# with prose length. Default 4096. Raise if you audit large batches and see
# truncated verdicts.
max_tokens = 4096

# Optional. Anthropic API key for the judge call. Normally leave this UNSET and
# provide the key via the ANTHROPIC_API_KEY environment variable, which is the
# primary and recommended path (it keeps the secret out of a file that may be
# committed). This key exists only for users who prefer config-file secrets;
# when set it takes precedence over the environment variable. Default unset
# (falls back to $ANTHROPIC_API_KEY).
# api_key = "sk-ant-..."

# Optional, ACCEPTED (v1): documented and parsed but not yet enforced this
# release. Intended per-request timeout for the judge call, in seconds. Once
# implemented, a timeout will fail loud on the CLI (visible error, non-zero
# exit) while a Stop / PostToolUse hook prints the error but does NOT block the
# turn, so a judge/network failure never wedges your session. Planned default
# 120. Setting it today is harmless and has no effect.
request_timeout_s = 120

# Optional, ACCEPTED (v1): documented and parsed but not yet enforced this
# release. Intended cap, in characters, on how much of the work-unit text is
# sent to the judge. The judge normally needs the whole finished work to decide
# if a rule would have changed it, so the planned default is 0 (no truncation);
# a positive value will trade judge accuracy on late changes for fewer tokens
# on very large diffs. Setting it today is harmless and has no effect.
work_unit_char_limit = 0


# ----------------------------------------------------------------------------
# [ledger]: the append-only SURFACED / ACTIONED / DECLINED log (anti-nag)
# ----------------------------------------------------------------------------
# The ledger is what makes Lazarus quiet. It is an append-only JSONL file keyed
# on (work_unit_sig, rule_id), where work_unit_sig is a sha256 of the
# normalized work-unit. Before the judge runs, Lazarus drops any candidate
# whose (sig, rule_id) is already DECLINED, so a rule judged irrelevant for
# this exact work, or one you dismissed, is never re-surfaced for the same
# work. It is SIGNATURE-SCOPED, not a permanent per-rule mute: substantially
# different work is a new signature and gets a fresh look.
#
# Surfaced proposals are written as SURFACED. Acting on one, or dismissing one,
# is a separate human step recorded via `lazarus ledger action` /
# `lazarus ledger decline`; nothing is auto-applied.
[ledger]

# Path to the append-only JSONL ledger file. Relative paths resolve against
# this config file's directory. The parent directory is created if missing.
# Keep this in version control if you want the DECLINED/ACTIONED history to
# travel with the corpus; keep it out (gitignored) if it is per-machine.
# Default ".lazarus/ledger.jsonl".
path = ".lazarus/ledger.jsonl"

# Whether DECLINED entries suppress re-surfacing for the same work_unit_sig.
# This is the anti-nag property. Leave true in normal use. Set false only to
# temporarily audit everything the judge would surface regardless of prior
# declines (e.g. when debugging judge calibration). Default true.
suppress_declined = true


# ============================================================================
# [async]: run the audit OFF the critical path (v2)
# ============================================================================
# NEW IN v2. Everything above this line is the v1 engine and is UNCHANGED; an
# existing v1 config that has no [async] table keeps loading and running exactly
# as before, because an absent [async] table means "all defaults" and the
# defaults are chosen so nothing turns on unless you wire the v2 hooks.
#
# What v2 changes: v1 runs the SONAR -> LAZARUS -> ledger audit as a BLOCKING
# Stop / PostToolUse hook, so every operation pays the judge-latency tax even
# when nothing is caught. v2 moves that same audit (same engine, same judge,
# same ledger, same signatures) OFF the critical path:
#
#   1. A NON-BLOCKING LAUNCHER hook (Stop / PostToolUse) captures the finished
#      work-unit, spawns a DETACHED background runner, and returns in ~ms.
#   2. The BACKGROUND RUNNER (`lazarus-audit-bg`) runs the full v1 pipeline
#      concurrently with your next turn and writes survivors to a pending
#      queue (append-only JSONL, work-unit-signature keyed, dedup-safe).
#   3. A NEXT-TURN INJECTION hook (UserPromptSubmit) surfaces the unconsumed
#      findings as context, then marks them consumed. No findings -> silent.
#   4. An OPTIONAL SHIFT-LEFT PRE-GATE hook (PreToolUse, [async.pregate]) runs
#      a tightly-bounded synchronous check on the PLANNED action to prevent the
#      rare, unambiguous, high-confidence violation before it is written.
#
# The two paths are mutually exclusive at runtime. In "async" mode the launcher
# dispatches the runner and REPLACES v1's retro_audit.py on Stop / PostToolUse;
# in "sync" mode the launcher is a no-op and v1's blocking retro-audit stays
# authoritative. Do not wire both the v1 retro_audit hook AND the v2 launcher on
# the same event, or you will double-audit. See hooks/settings.snippet.v2.json.
#
# The async path PROPOSES, never auto-applies, exactly like v1. It reuses the v1
# engine unchanged (run_sonar_for_config, run_lazarus, the judge, the ledger,
# work_unit_signature) and adds only a transport, so there is still exactly one
# place that audits.
[async]

# Master switch: "async" or "sync".
#   "async" runs the launcher + runner + inject pipeline (audit off the
#           critical path, hidden behind your next turn).
#   "sync"  makes the launcher a no-op so the v1 BLOCKING retro-audit path is
#           authoritative. This is the v1 behaviour, unchanged.
#
# DEFAULT IS AUTO-DETECTED at load time. If you set NEITHER `mode` NOR `enabled`
# below, the loader reads it from the environment: the v2 settings snippet
# exports LAZARUS_ASYNC=1, so a config used with the v2 hooks auto-selects
# "async", while the same config used without the v2 hooks stays "sync". Setting
# `mode` (or `enabled`) explicitly OVERRIDES the auto-detect. Leaving the whole
# [async] table out is equivalent to sync-with-auto-detect and keeps v1 configs
# working untouched.
mode = "async"

# Convenience boolean, equivalent to `mode`. Exposed because a boolean reads
# more cleanly in a settings file (`enabled = true`) than a string. If you set
# BOTH `mode` and `enabled` they MUST agree (mode == "async" iff enabled ==
# true); a config that sets both to disagree fails loud rather than silently
# picking one. Default: mode == "async". Leave one of the two set, not both.
enabled = true

# Where the pending-findings queue (the async twin of the ledger) lives. This
# is a SEPARATE file from [ledger].path and does a separate job: the ledger
# records judge VERDICTS for anti-nag; the pending queue records SURFACED
# findings AWAITING INJECTION and whether they were consumed. It is an
# append-only JSONL keyed on the SAME (work_unit_sig, rule_id) pair the ledger
# uses. Relative paths resolve against this config file's directory (same rule
# as [ledger].path); the parent directory is created on first write. Default
# ".lazarus/pending.jsonl".
pending_path = ".lazarus/pending.jsonl"

# Spool directory the launcher uses. It holds two things, both per-run and both
# safe to delete when idle:
#   - wu-<run_id>.txt : the extracted work-unit the launcher hands the detached
#                       child by FILE (not a pipe: the parent hook has already
#                       exited by the time the child reads it).
#   - log-<run_id>.txt: the detached runner's stdout/stderr, so a background
#                       crash is inspectable but never lands on your console.
# Relative paths resolve against this config file's directory; created on first
# use. Default ".lazarus/async". (v2 leaves these files on disk; a `lazarus
# async gc` retention command is deferred to a later release.)
spool_dir = ".lazarus/async"

# Force the offline deterministic STUB judge in the background runner. This is
# the SAME stub the v1 demo ships, wired through the SAME JudgeFn seam
# run_lazarus already exposes, so the entire async cycle (launcher -> runner ->
# pending queue -> inject) runs with NO `anthropic` package and NO API key. Set
# true for CI or no-key installs where you want to exercise the transport
# without spending tokens. Default false -> the runner uses the real judge,
# exactly like the sync path. (The launcher propagates this to the child as the
# `--stub` flag; you can also pass `--stub` to `lazarus-audit-bg` directly.)
stub_judge = false


# ----------------------------------------------------------------------------
# [async.pregate]: the optional synchronous shift-left gate (PreToolUse)
# ----------------------------------------------------------------------------
# OPT-IN and DEFAULT OFF. This is the ONE place v2 puts a judge call back ON the
# critical path, so it is deliberately narrow. It runs a tightly-bounded
# synchronous SONAR + LAZARUS on the PLANNED action (the pending Write/Edit
# args, before the tool runs) and surfaces ONLY the highest-confidence rules,
# to PREVENT the rare unambiguous violation (for example, about to write a
# logged secret) rather than patch it afterward.
#
# It never writes the pending queue and never records to the ledger
# (record=False), so it cannot suppress or pre-empt the authoritative async
# retro-audit that runs on the same work moments later on Stop / PostToolUse.
# It surfaces context but defaults to ALLOW; a judge error also defaults to
# allow (it never hard-blocks your action). A strict-blocking mode is deferred.
#
# To enable it you must BOTH set `enabled = true` here AND move the commented-
# out PreToolUse block from hooks/settings.snippet.v2.json into your live hooks.
# Turning it on here without wiring the hook does nothing; wiring the hook
# without turning it on here makes the hook a no-op.
[async.pregate]

# Master switch for the pre-gate. Default false (off). The three narrowness
# knobs below only matter when this is true.
enabled = false

# Confidence floor applied AFTER the judge: only findings at or above this are
# surfaced by the pre-gate. Set HIGH on purpose (well above the judge's normal
# `min_confidence` of 0.6) so that only near-certain "this WILL change the
# output" verdicts fire, and the merely-plausible matches (the class that makes
# shift-left gates noisy) are dropped. Range 0.0-1.0. Default 0.85.
min_confidence = 0.85

# Hard cap on candidates the pre-gate judges synchronously, applied BEFORE the
# judge call. SONAR's shortlist is truncated to this many top-scoring rules, so
# the on-path judge call is bounded to a tiny batch. This bounds both the
# latency the gate deliberately reintroduces AND the noise (the deep tail of
# SONAR recall never reaches the judge here). Kept tiny. Integer >= 1.
# Default 3.
max_candidates = 3
